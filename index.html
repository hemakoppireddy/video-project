<!DOCTYPE html>
<html>

<head>
  <title>Video Player</title>
  <link rel="stylesheet" href="style.css">
  <link rel="icon" href="data:,">
</head>

<body>

<div class="video-container">

  <h2>My Video Player</h2>

  <video id="video-player"></video>

  <div class="controls">

    <!-- Buttons -->
    <div class="controls-row">
      <button data-testid="play-pause-button">Play</button>
      <button data-testid="mute-button">Mute</button>
      <button data-testid="fullscreen-button">Fullscreen</button>
    </div>

    <!-- Progress -->
    <input type="range" data-testid="progress-bar" min="0" max="100" value="0">

    <!-- Volume -->
    <div class="controls-row">
      <label>Volume</label>
      <input type="range" data-testid="volume-slider" min="0" max="1" step="0.1" value="1">
    </div>

    <!-- Quality & Speed -->
    <div class="controls-row">
      <label>Quality</label>
      <select data-testid="quality-selector"></select>

      <label>Speed</label>
      <select data-testid="playback-speed-selector">
        <option value="1">1x</option>
        <option value="1.5">1.5x</option>
        <option value="2">2x</option>
      </select>
    </div>

    <!-- Bitrate -->
    <div data-testid="current-bitrate-display">Bitrate: --</div>

  </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
<script src="script.js"></script>

</body>

</html>
